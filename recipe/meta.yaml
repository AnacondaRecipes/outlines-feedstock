{% set name = "outlines" %}
{% set version = "0.1.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/outlines-{{ version }}.tar.gz
  sha256: 0997bd9da1cc050e430bd08995dc7d4bd855918bafa4531e49d3f37110a23aba

build:
  skip: true # [ py<310 ]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools >=45
    - setuptools-scm >=6.2
    - pip
    - wheel
    - pytorch =={{ pytorch }}
  run:
    - python
    - interegular
    - jinja2
    - lark
    - nest-asyncio
    - numpy
    - cloudpickle
    - diskcache
    - pydantic >=2.0
    - referencing
    - jsonschema
    - requests
    - tqdm
    - typing_extensions
    - pycountry
    - airportsdata
    - pytorch
    - outlines-core =0.1.26

test:
  imports:
    - outlines
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://dottxt-ai.github.io/outlines/latest/
  summary: Outlines guarantees structured outputs during generation
  description: |
    LLMs are powerful but their outputs are unpredictable. Most solutions attempt to fix bad 
    outputs after generation using parsing, regex, or fragile code that breaks easily.

    Outlines guarantees structured outputs during generation — directly from any LLM.
  license: Apache-2.0
  license_file: LICENSE
  license_family: Apache
  doc_url: https://dottxt-ai.github.io/outlines/latest/
  dev_url: https://github.com/dottxt-ai/outlines

extra:
  recipe-maintainers:
    - maresb
    - pavelzw
